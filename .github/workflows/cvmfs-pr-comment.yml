name: CVMFS PR comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  comment-cvmfs-benchmark:
    name: Comment CVMFS benchmark summary on PR
    if:
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Download benchmark artifact
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: cvmfs-benchmark-json
          path: .benchmarks
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Check benchmark artifact
        id: benchmark-artifact
        run: |
          if [ -f .benchmarks/cvmfs-benchmark.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build benchmark PR summary
        if: steps.benchmark-artifact.outputs.found == 'true'
        run: python .github/scripts/summarize_benchmark.py

      - name: Comment benchmark summary on PR
        if: steps.benchmark-artifact.outputs.found == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cvmfs-benchmark
          number: ${{ github.event.workflow_run.pull_requests[0].number }}
          path: .benchmarks/pr-comment.md
